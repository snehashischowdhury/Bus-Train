<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Details | TravelEaZ</title>

    <link rel="stylesheet" href="css/passenger.css">
</head>

<body>

    <header>

        <nav class="navbar">

            <a href="/" class="logo">
                <h1>TravelEaZ</h1>
            </a>

            <a href="#" id="backBtn">← Back to Seat Selection</a>

        </nav>

    </header>

    <section class="passenger-container">

        <!-- Passenger Form -->

        <div class="form-box">

            <h1>Passenger Details</h1>

            <form id="passengerForm">

                <div class="input-group">

                    <label>Full Name</label>

                    <input type="text" id="fullName" placeholder="Enter your full name">

                </div>

                <div class="input-group">

                    <label>Age</label>

                    <input type="number" id="age" placeholder="Enter your age">

                </div>

                <div class="input-group">

                    <label>Gender</label>

                    <select id="gender">

                        <option value="">Select Gender</option>

                        <option>Male</option>

                        <option>Female</option>

                        <option>Other</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Phone Number</label>

                    <input type="tel" id="phone" placeholder="Enter phone number">

                </div>

                <div class="input-group">

                    <label>Email Address</label>

                    <input type="email" id="email" placeholder="Enter your email">

                </div>

                <button type="submit" class="button">

                    Proceed to Payment

                </button>

            </form>

        </div>

        <!-- Booking Summary -->

        <div class="summary">

            <h2>Booking Summary</h2>

            <p>

                <strong>Vehicle :</strong>

                <span id="summaryVehicle">Express Bus</span>

            </p>

            <p>

                <strong>Route :</strong>

                <span id="summaryRoute">Kolkata → Delhi</span>

            </p>

            <p id="coachRow">

                <strong>Coach :</strong>

                <span id="summaryCoach">B1</span>

            </p>

            <p>

                <strong>Seat :</strong>

                <span id="summarySeat">10</span>

            </p>

            <p>

                <strong>Fare :</strong>

                <span id="summaryFare">₹799</span>

            </p>

        </div>

    </section>

    <script src="js/passenger.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | TravelEaZ</title>

    <link rel="stylesheet" href="css/booking.css">
</head>

<body>

    <header>

        <nav class="navbar">

            <a href="/" class="logo">
                <h1>TravelEaZ</h1>
            </a>

            <a href="/search">← Back to Search Results</a>

        </nav>

    </header>

    <section class="booking-container">

        <!-- Booking Information -->

        <div class="booking-info">

            <h1>Select Your Seat</h1>

            <h3 id="busName">Express Bus</h3>

            <p id="route">Kolkata → Delhi</p>

            <p id="journeyDate">12 August 2026</p>

        </div>


        <!-- Seat Layout -->

        <div class="seat-layout">

            <div class="driver">
                DRIVER
            </div>

            <div class="seats">

                <div class="seat available" data-seat="1">1</div>
                <div class="seat available" data-seat="2">2</div>

                <div class="seat available" data-seat="3">3</div>
                <div class="seat booked" data-seat="4">4</div>

                <div class="seat available" data-seat="5">5</div>
                <div class="seat available" data-seat="6">6</div>

                <div class="seat booked" data-seat="7">7</div>
                <div class="seat available" data-seat="8">8</div>

                <div class="seat available" data-seat="9">9</div>
                <div class="seat selected" data-seat="10">10</div>

                <div class="seat available" data-seat="11">11</div>
                <div class="seat available" data-seat="12">12</div>

                <div class="seat available" data-seat="13">13</div>
                <div class="seat booked" data-seat="14">14</div>

                <div class="seat available" data-seat="15">15</div>
                <div class="seat available" data-seat="16">16</div>

            </div>

        </div>


        <!-- Legend -->

        <div class="legend">

            <div class="legend-item">
                <div class="box available"></div>
                <span>Available</span>
            </div>

            <div class="legend-item">
                <div class="box booked"></div>
                <span>Booked</span>
            </div>

            <div class="legend-item">
                <div class="box selected"></div>
                <span>Selected</span>
            </div>

        </div>


        <!-- Booking Summary -->

        <div class="summary">

            <h2>Booking Summary</h2>

            <p>
                <strong>Bus :</strong>
                <span id="summaryBus">Express Bus</span>
            </p>

            <p>
                <strong>Seat :</strong>
                <span id="summarySeat">10</span>
            </p>

            <p>
                <strong>Fare :</strong>
                <span id="summaryFare">₹799</span>
            </p>

            <a href="/passenger" class="continue-btn" id="continueBtn">
                Continue
            </a>

        </div>

    </section>

    <script src="js/bus-booking.js"></script>

</body>

</html>
